<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KLARK VPN — Подписка Happ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <!-- FingerprintJS v4 -->
  <script src="https://openfpcdn.io/fingerprintjs/v4"></script>
  <style>
    .neon-text {
      text-shadow: 0 0 10px #40c4ff, 0 0 20px #1b98e0, 0 0 30px #0d47a1;
    }
    .pulse-dot {
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.4); opacity: 0.7; }
    }
    .fade-in-up {
      animation: fadeInUp 0.8s ease-out forwards;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .btn-glow {
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
    }
    .btn-glow:hover {
      box-shadow: 0 0 30px rgba(59, 130, 246, 0.8);
    }
    .animate-pulse-slow { animation: pulse 6s infinite ease-in-out; }
  </style>
</head>
<body class="bg-gradient-to-b from-blue-950 to-black text-white min-h-screen font-sans">

  <!-- ЛОГО + НАЗВАНИЕ -->
  <div class="font-bold tracking-wide neon-text text-4xl text-center pt-10">
    KLARK VPN
  </div>

  <!-- SVG-ЛОГО (оставил как есть, можно дополнить) -->
  <div class="flex justify-center mt-10 mb-8 relative">
    <div class="logo-shield relative">
      <div class="absolute inset-0 rounded-full bg-cyan-500/20 blur-3xl animate-pulse-slow"></div>
      <svg width="220" height="220" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M110 20 C50 20 20 70 20 110 C20 150 50 200 110 200 C170 200 200 150 200 110 C200 70 170 20 110 20 Z"
              fill="none" stroke="#00f0ff" stroke-width="12" stroke-opacity="0.6"/>
        <!-- Здесь можно добавить остальные элементы логотипа -->
      </svg>
    </div>
  </div>

  <h1 class="text-5xl font-extrabold text-center mb-1 tracking-tighter neon-text fade-in-up" style="animation-delay: 0.2s;">
    KlarkVpn
  </h1>
  <p class="text-center text-blue-300 text-xl mb-10 fade-in-up" style="animation-delay: 0.4s;">
    Подписка для Happ
  </p>

  <!-- Блок активной подписки -->
  <div id="subscription-block" class="hidden mx-6 mb-10 bg-blue-950/50 rounded-2xl p-6 border border-blue-500/40 fade-in-up" style="animation-delay: 0.6s;">
    <div class="flex justify-between items-center mb-5">
      <div class="flex items-center gap-3">
        <span class="pulse-dot inline-block w-4 h-4 bg-cyan-400 rounded-full shadow-lg shadow-cyan-500/60"></span>
        <span class="text-lg font-semibold">KlarkVpn</span>
      </div>
      <div id="expires-date" class="text-cyan-300 font-medium">загружается...</div>
    </div>
    <div class="flex justify-between text-sm opacity-90">
      <div class="flex items-center gap-2">
        <span>Устройств</span>
        <span id="devices-count" class="font-mono bg-cyan-900/50 px-2 py-1 rounded">• ?</span>
      </div>
      <div class="text-cyan-400 font-semibold">Подписка активна</div>
    </div>
  </div>

  <!-- Блок НЕ активной подписки -->
  <div id="no-subscription-block" class="hidden mx-6 mb-10 bg-red-950/30 rounded-2xl p-6 border border-red-500/30 text-center fade-in-up" style="animation-delay: 0.6s;">
    <p class="text-xl font-semibold text-red-300 mb-3">Подписка не активна</p>
    <p class="text-blue-200 mb-4">Оформите подписку, чтобы пользоваться KLARK VPN без ограничений</p>
    <a href="https://t.me/CKOPO4" target="_blank"
       class="inline-block bg-red-700 hover:bg-red-600 px-8 py-3 rounded-xl font-bold text-lg shadow-lg transition-all">
       Оформить подписку
    </a>
  </div>

  <!-- Кнопка продления -->
  <div class="mx-6 mb-10 text-center">
    <a href="https://t.me/CKOPO4" target="_blank"
       class="inline-flex btn-glow items-center justify-center gap-3 w-full bg-gradient-to-r from-blue-700 to-indigo-700 hover:from-blue-800 hover:to-indigo-800 py-5 rounded-2xl font-bold text-xl shadow-xl transition-all duration-400">
      💳 Продлить подписку
      <span class="bg-white/15 px-4 py-1 rounded-xl text-base">от 50 ₽</span>
    </a>
    <p class="text-sm mt-3 opacity-80">Нажми → чат с @CKOPO4</p>
  </div>

  <!-- Нижние кнопки -->
  <div class="grid grid-cols-2 gap-4 px-6 pb-10">
    <a href="profile.html" class="btn-glow bg-blue-900/60 hover:bg-blue-800 py-4 rounded-2xl text-base font-medium flex items-center justify-center gap-2 transition-all">
      👤 Профиль
    </a>
    <a href="https://t.me/CKOPO4" target="_blank" class="btn-glow bg-blue-900/60 hover:bg-blue-800 py-4 rounded-2xl text-base font-medium flex items-center justify-center gap-2 transition-all">
      💬 Помощь
    </a>
  </div>

  <script>
    const SUPABASE_URL = 'https://guubiysgtzcgicxichqg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1dWJpeXNndHpjZ2ljeGljaHFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1ODU4NzksImV4cCI6MjA4OTE2MTg3OX0.n0wbEP1f-UjBVC8K_iVmESY32FDMKHTV-sFMtmRQc0s';

    let supabaseClient = null;
    let currentUser = null;

    window.addEventListener('load', async () => {
      console.log("Страница загружена");

      if (typeof supabase === 'undefined') {
        console.error("Supabase не загрузился");
        showNoSubBlock("Ошибка: Supabase не доступен");
        return;
      }

      supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      console.log("Supabase клиент создан");

      await checkUserAndLoadStatus();
    });

    function showNoSubBlock(customText = null) {
      const block = document.getElementById('no-subscription-block');
      if (block) {
        if (customText) {
          block.querySelector('p:first-of-type').textContent = customText;
        }
        block.classList.remove('hidden');
        document.getElementById('subscription-block')?.classList.add('hidden');
      }
    }

    function showSubscriptionBlock() {
      document.getElementById('subscription-block')?.classList.remove('hidden');
      document.getElementById('no-subscription-block')?.classList.add('hidden');
    }

    async function checkUserAndLoadStatus() {
      try {
        const { data: { user }, error } = await supabaseClient.auth.getUser();
        if (error) throw error;

        currentUser = user;

        if (!user) {
          console.log("Пользователь не авторизован");
          showNoSubBlock();
          return;
        }

        console.log("Пользователь авторизован:", user.id);

        // Проверяем подписку
        const { data: sub, error: subError } = await supabaseClient
          .from('subscriptions')
          .select('id, expires_at, max_devices, status')
          .eq('user_id', user.id)
          .maybeSingle();

        if (subError) throw subError;

        if (!sub || !sub.expires_at) {
          showNoSubBlock("Нет активной подписки");
          return;
        }

        const expires = new Date(sub.expires_at);
        const now = new Date();

        if (expires <= now || sub.status !== 'active') {
          showNoSubBlock("Подписка истекла или неактивна");
          return;
        }

        // Подписка активна → проверяем устройство
        let fingerprint = null;
        try {
          const fp = await FingerprintJS.load({ monitoring: false });
          const result = await fp.get();
          fingerprint = result.visitorId;
        } catch (fpErr) {
          console.error("FingerprintJS ошибка:", fpErr);
          showNoSubBlock("Ошибка проверки устройства. Попробуйте позже.");
          return;
        }

        const { data: device } = await supabaseClient
          .from('subscription_devices')
          .select('id')
          .eq('user_id', user.id)
          .eq('fingerprint', fingerprint)
          .maybeSingle();

        if (!device) {
          showNoSubBlock("Подписка активна, но это устройство не привязано. Привяжите его в профиле.");
          return;
        }

        // Всё ок — показываем активную подписку
        showSubscriptionBlock();
        document.getElementById('expires-date').textContent =
          `до ${expires.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' })} г.`;
        document.getElementById('devices-count').textContent =
          `• ${sub.max_devices || 3}`;

      } catch (err) {
        console.error("Ошибка загрузки статуса:", err);
        showNoSubBlock("Ошибка загрузки статуса подписки");
      }
    }
  </script>
</body>
</html>
