<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KLARK VPN — Elite Shadow Access</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://openfpcdn.io/fingerprintjs/v4"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --blur-glow: rgba(64, 196, 255, 0.35);
      --pulse-cyan: #40c4ff;
      --pulse-purple: #a78bfa;
      --glass-bg: rgba(30, 40, 60, 0.28);
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0e1a 0%, #000000 100%);
      color: #e0f7ff;
      overflow-x: hidden;
      min-height: 100vh;
    }
    .bg-gradient-pulse {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 30% 20%, var(--pulse-cyan) 0%, transparent 40%),
                  radial-gradient(circle at 70% 80%, var(--pulse-purple) 0%, transparent 50%);
      opacity: 0.12;
      animation: slowPulse 18s infinite ease-in-out;
      z-index: -2;
    }
    @keyframes slowPulse {
      0%, 100% { transform: scale(1); opacity: 0.12; }
      50%      { transform: scale(1.15); opacity: 0.18; }
    }
    .glass-holo {
      background: var(--glass-bg);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(64, 196, 255, 0.22);
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6), 0 0 60px var(--blur-glow);
      transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .glass-holo:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 80px rgba(64, 196, 255, 0.4), 0 0 100px rgba(167, 139, 250, 0.3);
      border-color: rgba(167, 139, 250, 0.45);
    }
    .logo-pulse {
      position: relative;
      animation: logoGlow 5s infinite ease-in-out;
    }
    @keyframes logoGlow {
      0%, 100% { filter: drop-shadow(0 0 20px var(--pulse-cyan)); }
      50%      { filter: drop-shadow(0 0 60px var(--pulse-cyan)) drop-shadow(0 0 30px var(--pulse-purple)); }
    }
    .pulse-ring {
      position: absolute;
      inset: -20px;
      border-radius: 9999px;
      border: 2px solid var(--pulse-cyan);
      opacity: 0.4;
      animation: ringPulse 4s infinite ease-out;
    }
    @keyframes ringPulse {
      0%   { transform: scale(0.8); opacity: 0.6; }
      50%  { transform: scale(1.3); opacity: 0; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    .btn-premium {
      background: linear-gradient(45deg, #40c4ff, #a78bfa, #40c4ff);
      background-size: 200% 200%;
      animation: gradientFlow 7s ease infinite;
      box-shadow: 0 0 40px rgba(64, 196, 255, 0.5);
    }
    @keyframes gradientFlow {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .status-pulse {
      animation: ping 2.5s cubic-bezier(0, 0, 0.2, 1) infinite;
    }
    @keyframes ping {
      0%   { transform: scale(1); opacity: 1; }
      75%  { transform: scale(2.2); opacity: 0; }
      100% { transform: scale(2.2); opacity: 0; }
    }
    @media (max-width: 640px) {
      h1 { font-size: 3.8rem; }
    }
  </style>
</head>
<body class="relative">

  <div class="bg-gradient-pulse"></div>

  <!-- Header + Logo с сильным pulse и blur glow -->
  <header class="pt-12 pb-10 px-6 text-center relative">
    <div class="relative inline-block logo-pulse">
      <div class="pulse-ring"></div>
      <div class="absolute inset-[-60px] rounded-full bg-gradient-to-r from-cyan-500/20 via-purple-500/15 to-transparent blur-3xl animate-pulse"></div>
      
      <svg width="160" height="160" viewBox="0 0 220 220" class="mx-auto relative z-10">
        <defs>
          <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>
        <circle cx="110" cy="110" r="95" fill="none" stroke="#40c4ff" stroke-width="10" filter="url(#glow)" opacity="0.9"/>
        <circle cx="110" cy="110" r="70" fill="none" stroke="#a78bfa" stroke-width="6" opacity="0.7">
          <animate attributeName="r" values="70;75;70" dur="6s" repeatCount="indefinite"/>
        </circle>
      </svg>
    </div>

    <h1 class="mt-8 text-6xl md:text-8xl font-extrabold tracking-tight font-orbitron text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 via-purple-400 to-cyan-300 drop-shadow-[0_0_30px_rgba(64,196,255,0.7)]">
      KLARK<span class="text-purple-300">.</span>VPN
    </h1>
    <p class="mt-4 text-2xl text-cyan-200/90 font-light tracking-wide">
      Elite • Happ Shadow Access
    </p>
  </header>

  <!-- Active Subscription Block -->
  <section id="subscription-block" class="hidden max-w-2xl mx-auto px-5 pb-12">
    <div class="glass-holo rounded-3xl p-8 md:p-12 shadow-2xl relative overflow-hidden">
      <div class="absolute inset-0 bg-gradient-to-br from-cyan-900/5 to-purple-900/5 pointer-events-none"></div>
      
      <div class="flex flex-col md:flex-row justify-between items-center gap-8 mb-10">
        <div class="flex items-center gap-5">
          <span class="relative flex h-7 w-7">
            <span class="status-pulse absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-70"></span>
            <span class="relative inline-flex rounded-full h-7 w-7 bg-gradient-to-br from-cyan-400 to-purple-500 shadow-lg shadow-cyan-500/50"></span>
          </span>
          <span class="text-3xl font-bold text-cyan-300">PROTECTED</span>
        </div>
        <div id="expires-date" class="text-3xl font-semibold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-400">
          LOADING...
        </div>
      </div>

      <div class="grid grid-cols-2 md:grid-cols-3 gap-6 text-center">
        <div class="glass-holo p-6 rounded-2xl">
          <div class="text-cyan-300 text-sm mb-1">DEVICES</div>
          <div id="devices-count" class="text-4xl font-bold text-white">• ?</div>
        </div>
        <div class="glass-holo p-6 rounded-2xl">
          <div class="text-purple-300 text-sm mb-1">STATUS</div>
          <div class="text-4xl font-bold text-green-400">ACTIVE</div>
        </div>
        <div class="glass-holo p-6 rounded-2xl md:col-span-1 col-span-2">
          <div class="text-cyan-300 text-sm mb-1">EXPIRES</div>
          <div class="text-2xl font-semibold text-cyan-200" id="expires-info">...</div>
        </div>
      </div>

      <p class="mt-10 text-center text-lg text-cyan-200/80 italic">
        Invisible. Untraceable. Eternal shadow.
      </p>
    </div>
  </section>

  <!-- No Subscription -->
  <section id="no-subscription-block" class="hidden max-w-2xl mx-auto px-5 pb-12">
    <div class="glass-holo rounded-3xl p-10 md:p-14 text-center border border-purple-500/30 shadow-[0_0_80px_rgba(167,139,250,0.3)]">
      <h2 class="text-5xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-red-400 via-purple-500 to-cyan-400 mb-6 drop-shadow-[0_0_20px_rgba(255,100,100,0.5)]">
        ACCESS DENIED
      </h2>
      <p class="text-2xl text-cyan-200 mb-10">
        Unlock premium shadow layer
      </p>
      <a href="https://t.me/CKOPO4" target="_blank"
         class="btn-premium inline-flex items-center gap-5 px-12 py-6 rounded-2xl text-3xl font-bold text-black shadow-2xl hover:scale-105 transition-all">
        ACTIVATE NOW → @CKOPO4
      </a>
    </div>
  </section>

  <!-- Main CTA -->
  <section class="max-w-2xl mx-auto px-5 pb-12 text-center">
    <a href="https://t.me/CKOPO4" target="_blank"
       class="btn-premium inline-flex justify-center items-center gap-5 w-full max-w-lg mx-auto py-8 px-10 rounded-3xl text-3xl font-bold shadow-[0_0_90px_rgba(64,196,255,0.6)] hover:shadow-[0_0_140px_rgba(167,139,250,0.7)] transition-all">
      EXTEND SHADOW ACCESS
      <span class="text-xl bg-black/30 px-6 py-3 rounded-2xl">от 50 ₽</span>
    </a>
    <p class="mt-5 text-cyan-300/80 text-lg">Instant • Secure • @CKOPO4</p>
  </section>

  <!-- Bottom buttons -->
  <footer class="grid grid-cols-2 gap-6 px-6 pb-16 max-w-2xl mx-auto">
    <a href="profile.html" class="glass-holo py-8 rounded-2xl text-2xl font-bold flex items-center justify-center gap-4 hover:border-purple-400 transition-colors">
      PROFILE
    </a>
    <a href="https://t.me/CKOPO4" target="_blank" class="glass-holo py-8 rounded-2xl text-2xl font-bold flex items-center justify-center gap-4 hover:border-cyan-400 transition-colors">
      SUPPORT
    </a>
  </footer>

  <script>
    const SUPABASE_URL = 'https://guubiysgtzcgicxichqg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1dWJpeXNndHpjZ2ljeGljaHFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1ODU4NzksImV4cCI6MjA4OTE2MTg3OX0.n0wbEP1f-UjBVC8K_iVmESY32FDMKHTV-sFMtmRQc0s';

    let supabaseClient = null;

    window.addEventListener('load', async () => {
      supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      await checkUserAndLoadStatus();
    });

    function showNoSubBlock(msg = "ACCESS DENIED") {
      document.getElementById('no-subscription-block').classList.remove('hidden');
      document.getElementById('subscription-block').classList.add('hidden');
    }

    function showSubscriptionBlock() {
      document.getElementById('subscription-block').classList.remove('hidden');
      document.getElementById('no-subscription-block').classList.add('hidden');
    }

    async function checkUserAndLoadStatus() {
      try {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) return showNoSubBlock();

        const { data: sub } = await supabaseClient
          .from('subscriptions')
          .select('expires_at, max_devices, status')
          .eq('user_id', user.id)
          .maybeSingle();

        if (!sub || sub.status !== 'active' || new Date(sub.expires_at) <= new Date()) {
          return showNoSubBlock("EXPIRED");
        }

        const fp = await FingerprintJS.load({ monitoring: false });
        const { visitorId } = await fp.get();

        const { data: device } = await supabaseClient
          .from('subscription_devices')
          .select('id')
          .eq('user_id', user.id)
          .eq('fingerprint', visitorId)
          .maybeSingle();

        if (!device) return showNoSubBlock("DEVICE NOT LINKED");

        showSubscriptionBlock();
        const expDate = new Date(sub.expires_at).toLocaleDateString('ru-RU', {day: 'numeric', month: 'long', year: 'numeric'});
        document.getElementById('expires-date').textContent = expDate;
        document.getElementById('expires-info').textContent = `до ${expDate}`;
        document.getElementById('devices-count').textContent = `• ${sub.max_devices || 5}`;
      } catch (err) {
        console.error(err);
        showNoSubBlock("ERROR");
      }
    }
  </script>
</body>
</html>
