<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Профиль — KLARK VPN</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://openfpcdn.io/fingerprintjs/v4/umd.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      background: #000;
      color: #e0f0ff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }
    .logo-header {
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(64,196,255,0.2);
    }
    .glass-card {
      background: rgba(10,15,30,0.65);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(64,196,255,0.25);
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      transition: all 0.4s ease;
    }
    .glass-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(64,196,255,0.3);
    }
    .neon-text {
      text-shadow: 0 0 10px #40c4ff, 0 0 20px #1b98e0;
    }
    .glow-btn {
      box-shadow: 0 0 20px rgba(64,196,255,0.5);
      transition: all 0.3s;
    }
    .glow-btn:hover {
      box-shadow: 0 0 35px rgba(64,196,255,0.8);
      transform: scale(1.03);
    }
    .progress-bar {
      background: rgba(255,255,255,0.08);
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      background: linear-gradient(90deg, #40c4ff, #7c3aed);
      height: 100%;
      transition: width 1s ease;
    }
    .status-badge {
      background: rgba(0,255,127,0.15);
      color: #00ff7f;
      border: 1px solid #00ff7f33;
    }
    .inactive-badge {
      background: rgba(255,80,80,0.15);
      color: #ff5050;
      border: 1px solid #ff505033;
    }
    .admin-section {
      border-top: 2px solid rgba(124,58,237,0.3);
    }
    @media (max-width: 640px) {
      .text-5xl { font-size: 2.5rem; }
      .text-4xl { font-size: 2rem; }
    }
  </style>
</head>
<body class="min-h-screen">

  <!-- Шапка с логотипом -->
  <header class="logo-header sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-5 flex items-center justify-between">
      <a href="index.html" class="text-cyan-400 hover:text-cyan-300 flex items-center gap-3 text-lg font-medium">
        ← На главную
      </a>
      <div class="flex items-center gap-6">
        <img src="mogged-full-logo.png" alt="MOGGED" class="h-10 md:h-12 w-auto object-contain">
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-5 py-10">
    <!-- Профильная карточка -->
    <div class="glass-card rounded-3xl p-8 md:p-12 mb-12 text-center">
      <h1 id="profile-username" class="text-5xl md:text-6xl font-black neon-text tracking-tight mb-3">
        Загрузка...
      </h1>
      <p class="text-xl text-cyan-300 mb-8 flex items-center justify-center gap-3">
        Premium пользователь <span class="text-yellow-400 text-2xl">👑</span>
      </p>

      <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
        <div class="glass-card rounded-2xl p-6">
          <div class="text-5xl mb-3">🔒</div>
          <div class="text-gray-400 mb-2">Статус</div>
          <div id="profile-status" class="text-2xl font-bold status-badge px-6 py-2 rounded-full inline-block">
            Загрузка...
          </div>
        </div>

        <div class="glass-card rounded-2xl p-6">
          <div class="text-5xl mb-3">📱</div>
          <div class="text-gray-400 mb-2">Устройств</div>
          <div class="text-2xl font-bold text-white">
            <span id="devices-text">0</span> / <span id="max-devices">10</span>
          </div>
          <div class="progress-bar mt-4">
            <div id="devices-bar" class="progress-fill w-0"></div>
          </div>
        </div>

        <div class="glass-card rounded-2xl p-6">
          <div class="text-5xl mb-3">📅</div>
          <div class="text-gray-400 mb-2">Осталось</div>
          <div id="days-left" class="text-2xl font-bold text-cyan-300">— дней</div>
        </div>

        <div class="glass-card rounded-2xl p-6">
          <div class="text-5xl mb-3">🔐</div>
          <div class="text-gray-400 mb-2">Истекает</div>
          <div id="profile-end" class="text-xl font-semibold text-gray-300">Загрузка...</div>
        </div>
      </div>
    </div>

    <!-- HWID блок -->
    <div class="glass-card rounded-3xl p-8 md:p-12 mb-12">
      <h2 class="text-3xl font-bold neon-text mb-8 text-center">HWID для Happ</h2>
      <div class="flex flex-col md:flex-row gap-6">
        <input 
          id="hwid-input" 
          type="text" 
          placeholder="Вставьте HWID из Happ" 
          class="flex-1 p-5 bg-black/40 border border-cyan-500/30 rounded-2xl focus:outline-none focus:border-cyan-400 text-white placeholder-gray-500"
        >
        <button id="save-hwid-btn" class="glow-btn bg-cyan-600 hover:bg-cyan-500 px-10 py-5 rounded-2xl font-bold text-lg whitespace-nowrap">
          Сохранить HWID
        </button>
      </div>
      <a 
        id="personal-link" 
        href="#" 
        target="_blank" 
        class="glow-btn block mt-6 py-6 bg-gradient-to-r from-blue-700 to-purple-700 rounded-2xl text-2xl font-bold text-center hover:opacity-90 transition"
      >
        МОЯ ЛИЧНАЯ ССЫЛКА HAPP
      </a>
    </div>

    <!-- Выход -->
    <button id="logout-btn" class="w-full py-6 bg-red-900/40 hover:bg-red-800/60 border border-red-500/40 rounded-2xl text-xl font-bold text-red-300 transition">
      Выйти из аккаунта
    </button>

    <!-- Админ-панель -->
    <div id="admin-panel" class="glass-card rounded-3xl p-10 mt-12 hidden admin-section">
      <h2 class="text-3xl font-bold neon-text mb-8 text-center">Админ: Выдать подписку</h2>
      <div class="grid md:grid-cols-3 gap-6">
        <input 
          id="admin-user-identifier" 
          type="text" 
          placeholder="Email или User ID" 
          class="p-5 bg-black/40 border border-purple-500/30 rounded-2xl focus:outline-none focus:border-purple-400 text-white placeholder-gray-500"
        >
        <input 
          id="admin-sub-end" 
          type="text" 
          placeholder="ДД.ММ.ГГГГ" 
          class="p-5 bg-black/40 border border-purple-500/30 rounded-2xl focus:outline-none focus:border-purple-400 text-white placeholder-gray-500"
        >
        <button id="admin-grant-btn" class="glow-btn bg-gradient-to-r from-purple-600 to-pink-600 py-5 rounded-2xl font-bold text-lg">
          Выдать / Обновить
        </button>
      </div>
      <p id="admin-message" class="text-center mt-6 text-lg min-h-[1.5rem]"></p>
    </div>
  </main>

      }

    }
  </script>
</body>
</html>
