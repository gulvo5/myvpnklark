<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Профиль — KLARK VPN</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Impact:wght@900&family=Inter:wght@400;600;700&display=swap');

    body {
      background: linear-gradient(180deg, #0a1428 0%, #000000 100%);
    }

    .glass {
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(64, 196, 255, 0.3);
    }

    .neon-text {
      text-shadow: 
        0 0 10px #40c4ff,
        0 0 20px #1b98e0,
        0 0 40px #0d47a1,
        0 0 60px #7c3aed;
    }

    .glow-button {
      box-shadow: 0 0 25px rgba(64, 196, 255, 0.6),
                  0 0 50px rgba(124, 58, 237, 0.4);
      transition: all 0.3s ease;
    }
    .glow-button:hover {
      box-shadow: 0 0 40px rgba(64, 196, 255, 0.9),
                  0 0 70px rgba(124, 58, 237, 0.7);
      transform: scale(1.03);
    }

    .avatar-glow {
      filter: drop-shadow(0 0 30px #40c4ff) drop-shadow(0 0 60px #7c3aed);
    }

    .pulse-dot {
      animation: pulse 2s infinite ease-in-out;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.6); }
    }

    .fade-in-up {
      animation: fadeInUp 0.9s ease-out forwards;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .stat-card {
      transition: all 0.3s ease;
    }
    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 0 25px rgba(64, 196, 255, 0.3);
    }
  </style>
</head>
<body class="min-h-screen text-white font-sans">

  <!-- ШАПКА С НАЗАДОМ -->
  <div class="flex items-center justify-between px-6 py-6">
    <a href="index.html" class="flex items-center gap-3 text-cyan-400 hover:text-cyan-300 font-medium text-lg">
      ← Главная
    </a>
    <div class="text-2xl font-black tracking-widest neon-text">KLARK VPN</div>
  </div>

  <div class="max-w-md mx-auto px-5 pb-12">

    <!-- ЛОГИН ФОРМА (показывается пока не вошёл) -->
    <div id="login-screen" class="fade-in-up">
      <div class="text-center mb-10">
        <div class="inline-flex items-center justify-center w-24 h-24 bg-gradient-to-br from-cyan-500 to-violet-600 rounded-3xl mb-6 avatar-glow">
          <span class="text-6xl font-black text-white">K</span>
        </div>
        <h1 class="text-5xl font-black neon-text tracking-tighter">Вход в профиль</h1>
        <p class="text-blue-300 mt-3">Введи данные от подписки</p>
      </div>

      <div class="glass rounded-3xl p-8">
        <input id="username" type="text" placeholder="Твой ник или ID (например: user123)" 
               class="w-full bg-black/40 border border-cyan-400/30 rounded-2xl px-6 py-5 text-lg focus:outline-none focus:border-cyan-400 placeholder:text-blue-300">
        
        <input id="password" type="password" placeholder="Пароль (для теста: klark123)" 
               class="mt-4 w-full bg-black/40 border border-cyan-400/30 rounded-2xl px-6 py-5 text-lg focus:outline-none focus:border-cyan-400">

        <button onclick="login()" 
                class="mt-8 w-full glow-button bg-gradient-to-r from-cyan-500 to-violet-600 py-6 rounded-3xl font-bold text-2xl tracking-wider">
          ВОЙТИ В ПРОФИЛЬ
        </button>

        <p class="text-center text-xs text-blue-300 mt-6">Данные сохранятся в твоём браузере</p>
      </div>
    </div>

    <!-- КРАСИВЫЙ ПРОФИЛЬ (показывается после входа) -->
    <div id="profile-screen" class="hidden fade-in-up">

      <!-- Аватар + имя -->
      <div class="flex flex-col items-center mb-8">
        <div class="relative">
          <div class="w-32 h-32 bg-gradient-to-br from-blue-600 to-cyan-500 rounded-3xl p-2 avatar-glow">
            <!-- Маленький щит K (твой оригинальный стиль) -->
            <svg width="112" height="112" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M96 16 C40 16 16 56 16 96 C16 136 40 176 96 176 C152 176 176 136 176 96 C176 56 152 16 96 16 Z" fill="#1b98e0" stroke="#0d47a1" stroke-width="12"/>
              <text x="96" y="135" font-family="Impact" font-size="110" fill="#e3f2fd" text-anchor="middle" dominant-baseline="middle" letter-spacing="-8">K</text>
            </svg>
          </div>
        </div>
        <h2 id="profile-username" class="mt-4 text-4xl font-black neon-text tracking-tighter">gulvo5</h2>
        <p class="text-cyan-300 text-sm">Premium пользователь</p>
      </div>

      <!-- Главная карточка статуса -->
      <div class="glass rounded-3xl p-8 mb-8">
        <div class="flex items-center justify-between mb-6">
          <div class="flex items-center gap-3">
            <span class="pulse-dot w-5 h-5 bg-emerald-400 rounded-full"></span>
            <span class="text-2xl font-bold">Подписка активна</span>
          </div>
          <span id="profile-end" class="text-emerald-400 font-semibold text-xl">9 июля 2026</span>
        </div>

        <!-- Устройства с прогресс-баром -->
        <div class="mb-8">
          <div class="flex justify-between text-sm mb-2">
            <span class="text-blue-300">Устройств</span>
            <span id="devices-text" class="font-mono">1 / 3</span>
          </div>
          <div class="h-3 bg-black/50 rounded-3xl overflow-hidden">
            <div id="devices-bar" class="h-3 bg-gradient-to-r from-cyan-400 to-violet-500 rounded-3xl w-1/3 transition-all"></div>
          </div>
        </div>

        <!-- Персональная ссылка -->
        <a id="happ-link" href="#" target="_blank"
           class="glow-button block text-center py-6 rounded-3xl bg-gradient-to-r from-emerald-500 to-teal-500 text-2xl font-bold tracking-wider">
          📲 МОЯ ЛИЧНАЯ ССЫЛКА HAPP
        </a>
      </div>

      <!-- Мини-карточки статов -->
      <div class="grid grid-cols-2 gap-4">
        <div class="glass rounded-3xl p-6 stat-card text-center">
          <div class="text-5xl mb-2">🔒</div>
          <div class="text-sm text-blue-300">Статус</div>
          <div id="profile-status" class="text-2xl font-bold text-emerald-400">Активна</div>
        </div>
        <div class="glass rounded-3xl p-6 stat-card text-center">
          <div class="text-5xl mb-2">📅</div>
          <div class="text-sm text-blue-300">Осталось</div>
          <div id="days-left" class="text-2xl font-bold text-cyan-300">112 дней</div>
        </div>
      </div>

      <!-- Кнопка выхода -->
      <button onclick="logout()" 
              class="mt-10 w-full py-5 text-red-400 font-medium text-lg border border-red-400/30 rounded-3xl hover:bg-red-400/10 transition-all">
        Выйти из профиля
      </button>
    </div>
  </div>

  <script>
    // === ТЕСТОВЫЕ ДАННЫЕ ПОЛЬЗОВАТЕЛЕЙ (можно добавлять сколько угодно) ===
    const usersDB = {
      "gulvo5": {
        endDate: "9 июля 2026 г.",
        devicesUsed: 1,
        devicesMax: 3,
        happLink: "happ://crypt5/тут_твоя_персональная_длинная_строка_для_gulvo5?installid=ABC123",
        daysLeft: "112"
      },
      "testuser": {
        endDate: "15 августа 2026 г.",
        devicesUsed: 2,
        devicesMax: 5,
        happLink: "happ://crypt5/тут_другая_строка_для_testuser?installid=XYZ789",
        daysLeft: "78"
      }
      // Добавь сюда новых пользователей по мере надобности
    };

    function login() {
      const username = document.getElementById('username').value.trim().toLowerCase();
      const password = document.getElementById('password').value;

      if (!username || password !== "klark123") {
        alert("Неверный пароль! Для теста используй: klark123");
        return;
      }

      if (!usersDB[username]) {
        alert("Пользователь не найден. Попробуй gulvo5 или testuser");
        return;
      }

      // Сохраняем в браузере (данные не пропадут пока не очистишь кэш)
      localStorage.setItem('klarkLoggedIn', 'true');
      localStorage.setItem('klarkUsername', username);

      showProfile(username);
    }

    function showProfile(username) {
      const data = usersDB[username];

      document.getElementById('login-screen').classList.add('hidden');
      const profileScreen = document.getElementById('profile-screen');
      profileScreen.classList.remove('hidden');

      // Заполняем данные
      document.getElementById('profile-username').textContent = username;
      document.getElementById('profile-end').textContent = data.endDate;
      document.getElementById('happ-link').href = data.happLink;
      document.getElementById('devices-text').textContent = `${data.devicesUsed} / ${data.devicesMax}`;
      document.getElementById('devices-bar').style.width = `${(data.devicesUsed / data.devicesMax) * 100}%`;
      document.getElementById('days-left').textContent = `${data.daysLeft} дней`;
    }

    function logout() {
      localStorage.clear();
      location.reload();
    }

    // При загрузке страницы проверяем, вошёл ли уже
    window.onload = () => {
      const isLogged = localStorage.getItem('klarkLoggedIn');
      const savedUser = localStorage.getItem('klarkUsername');

      if (isLogged === 'true' && savedUser && usersDB[savedUser]) {
        document.getElementById('login-screen').classList.add('hidden');
        showProfile(savedUser);
      } else {
        // Показываем форму входа
        document.getElementById('login-screen').classList.remove('hidden');
      }
    };
  </script>
</body>
</html>
