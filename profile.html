<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Профиль — KLARK VPN</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Твои стили неон, pulse, fade-in-up и т.д. — скопируй из index.html */
    .neon-text { text-shadow: 0 0 10px #40c4ff, 0 0 20px #1b98e0, 0 0 30px #0d47a1; }
    .pulse-dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.4); opacity: 0.7; } }
    .fade-in-up { animation: fadeInUp 0.8s ease-out forwards; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .btn-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
    .btn-glow:hover { box-shadow: 0 0 30px rgba(59, 130, 246, 0.8); }
  </style>
</head>
<body class="bg-gradient-to-b from-blue-950 to-black text-white min-h-screen font-sans">

  <!-- Шапка / назад -->
  <div class="p-6">
    <a href="index.html" class="text-cyan-400 hover:text-cyan-300 font-semibold flex items-center gap-2">
      ← Назад на главную

  </div>

  <!-- Основной блок профиля -->

          <span class="text-blue-300">Подписка активна до:</span>
          <span class="text-cyan-300 font-semibold">9 июля 2026 г.</span>
        </div>

        <div class="flex justify-between items-center">
          <span class="text-blue-300">Устройств:</span>
          <div class="flex items-center gap-3">
            <span class="font-mono bg-cyan-900/50 px-4 py-2 rounded-lg">1 / 3</span>
            <span class="text-green-400 text-sm">(активно)</span>
          </div>

        <div class="flex justify-between items-center">
          <span class="text-blue-300">Статус:</span>

         📲 Открыть мою личную подписку в Happ

      <p class="text-center text-sm mt-6 opacity-80">
        Если данные неверные или нужно продлить — напиши @CKOPO4
      </p>
    </div>
  </div>

</body>
</html>
