<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Профиль — KLARK VPN</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://openfpcdn.io/fingerprintjs/v4/umd.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      background: #000;
      color: #e0f0ff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      margin: 0;
    }
    .logo-header {
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(64,196,255,0.2);
    }
    .glass-card {
      background: rgba(10,15,30,0.75);
      backdrop-filter: blur(28px);
      border: 1px solid rgba(64,196,255,0.3);
      box-shadow: 0 10px 40px rgba(0,0,0,0.7);
      transition: all 0.4s ease;
    }
    .glass-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 60px rgba(64,196,255,0.4);
    }
    .neon-glow {
      text-shadow: 0 0 15px #40c4ff, 0 0 30px #1b98e0;
    }
    .glow-btn {
      box-shadow: 0 0 25px rgba(64,196,255,0.6);
      transition: all 0.3s;
    }
    .glow-btn:hover {
      box-shadow: 0 0 45px rgba(64,196,255,0.9);
      transform: scale(1.05);
    }
    .progress-bar {
      background: rgba(255,255,255,0.08);
      height: 14px;
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      background: linear-gradient(90deg, #40c4ff, #7c3aed);
      height: 100%;
      transition: width 1.2s ease;
    }
    .status-active {
      background: rgba(0,255,127,0.2);
      color: #00ff7f;
      border: 1px solid #00ff7f40;
    }
    .status-inactive {
      background: rgba(255,80,80,0.2);
      color: #ff5050;
      border: 1px solid #ff505040;
    }
  </style>
</head>
<body>

  <!-- Шапка с логотипом по центру -->
  <header class="logo-header sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-6 py-6 flex justify-center">
      <img src="mogged-full-logo.png" alt="MOGGED" class="h-16 md:h-24 w-auto object-contain">
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-5 py-12">
    <div id="auth-form" class="glass-card rounded-3xl p-10 max-w-lg mx-auto mb-12">
      <h2 class="text-4xl font-bold text-white text-center mb-8 neon-glow">Вход / Регистрация</h2>
      <input id="email" type="email" placeholder="Email" class="w-full p-5 mb-5 bg-black/50 border border-white/20 rounded-2xl text-white placeholder-gray-500 focus:outline-none focus:border-cyan-400">
      <input id="password" type="password" placeholder="Пароль" class="w-full p-5 mb-6 bg-black/50 border border-white/20 rounded-2xl text-white placeholder-gray-500 focus:outline-none focus:border-cyan-400">
      <button id="signin-btn" class="glow-btn w-full py-5 bg-cyan-600 rounded-2xl text-xl font-bold mb-4">Войти</button>
      <button id="signup-btn" class="w-full py-5 border border-white/30 rounded-2xl text-xl font-bold hover:bg-white/10">Зарегистрироваться</button>
      <p id="auth-message" class="text-center mt-6 text-lg"></p>
    </div>

    <div id="profile-content" style="display: none;">
      <!-- Профильная секция -->
      <div class="glass-card rounded-3xl p-10 mb-12 text-center">
        <h1 id="profile-username" class="text-5xl md:text-6xl font-black neon-glow mb-4">Загрузка...</h1>
        <p class="text-2xl text-cyan-300 mb-10 flex items-center justify-center gap-3">
          Premium пользователь <span class="text-yellow-400 text-3xl">👑</span>
        </p>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
          <div class="glass-card rounded-2xl p-6">
            <div class="text-6xl mb-4">🔒</div>
            <div class="text-gray-400 mb-2">Статус</div>
            <div id="profile-status" class="text-3xl font-bold px-8 py-3 rounded-full inline-block status-active">Загрузка...</div>
          </div>
          <div class="glass-card rounded-2xl p-6">
            <div class="text-6xl mb-4">📱</div>
            <div class="text-gray-400 mb-2">Устройств</div>
            <div class="text-3xl font-bold text-white mb-3">
              <span id="devices-text">0</span>/<span id="max-devices">10</span>
            </div>
            <div class="progress-bar">
              <div id="devices-bar" class="progress-fill w-0"></div>
            </div>
          </div>
          <div class="glass-card rounded-2xl p-6">
            <div class="text-6xl mb-4">✅</div>
            <div class="text-gray-400 mb-2">Статус</div>
            <div id="extra-status" class="text-3xl font-bold text-white">Загрузка...</div>
          </div>
          <div class="glass-card rounded-2xl p-6">
            <div class="text-6xl mb-4">📅</div>
            <div class="text-gray-400 mb-2">Осталось</div>
            <div id="days-left" class="text-3xl font-bold text-cyan-300">— дней</div>
          </div>
        </div>

        <div class="mt-8 text-xl text-gray-300">
          <span id="profile-end">Истекает: Загрузка...</span>
        </div>
      </div>

      <!-- HWID блок -->
      <div class="glass-card rounded-3xl p-10 mb-12">
        <h2 class="text-4xl font-bold neon-glow mb-8 text-center">HWID для Happ</h2>
        <div class="flex flex-col md:flex-row gap-6 items-center justify-center">
          <input id="hwid-input" type="text" placeholder="Вставьте HWID из Happ" class="flex-1 p-6 bg-black/50 border border-cyan-500/30 rounded-2xl text-white placeholder-gray-500 focus:outline-none focus:border-cyan-400">
          <button id="save-hwid-btn" class="glow-btn bg-cyan-600 px-10 py-6 rounded-2xl font-bold text-xl whitespace-nowrap">Сохранить</button>
        </div>
        <a id="personal-link" href="#" target="_blank" class="glow-btn block mt-8 py-7 bg-gradient-to-r from-blue-700 to-purple-700 rounded-2xl text-2xl font-bold text-center">
          МОЯ ЛИЧНАЯ ССЫЛКА HAPP
        </a>
      </div>

      <!-- Выход -->
      <button id="logout-btn" class="w-full max-w-md mx-auto block py-6 bg-red-900/50 hover:bg-red-800/70 border border-red-500/40 rounded-2xl text-xl font-bold text-red-300 transition mb-12">
        Выйти
      </button>

      <!-- Админ -->
      <div id="admin-panel" class="glass-card rounded-3xl p-10 hidden">
        <h2 class="text-4xl font-bold neon-glow mb-8 text-center">Админ: Выдать подписку</h2>
        <div class="grid md:grid-cols-3 gap-6">
          <input id="admin-user-identifier" type="text" placeholder="Email или User ID" class="p-6 bg-black/50 border border-purple-500/30 rounded-2xl text-white placeholder-gray-500">
          <input id="admin-sub-end" type="text" placeholder="ДД.ММ.ГГГГ" class="p-6 bg-black/50 border border-purple-500/30 rounded-2xl text-white placeholder-gray-500">
          <button id="admin-grant-btn" class="glow-btn bg-gradient-to-r from-purple-600 to-pink-600 py-6 rounded-2xl font-bold text-xl">
            Выдать / Обновить
          </button>
        </div>
        <p id="admin-message" class="text-center mt-8 text-xl"></p>
      </div>
    </div>
  </main>

  <script>
    // Твой скрипт (с обновлением UI для красивого отображения)
    const SUPABASE_URL = 'https://guubiysgtzcgicxichqg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1dWJpeXNndHpjZ2ljeGljaHFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1ODU4NzksImV4cCI6MjA4OTE2MTg3OX0.n0wbEP1f-UjBVC8K_iVmESY32FDMKHTV-sFMtmRQc0s';

    let supabaseClient = null;
    let currentUser = null;

    window.addEventListener('load', async () => {
      supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      document.getElementById('signin-btn')?.addEventListener('click', signIn);
      document.getElementById('signup-btn')?.addEventListener('click', signUp);
      document.getElementById('logout-btn')?.addEventListener('click', logout);
      document.getElementById('save-hwid-btn')?.addEventListener('click', saveHwid);
      document.getElementById('admin-grant-btn')?.addEventListener('click', adminGrantSubscription);
      await checkSession();
    });

    async function checkSession() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      currentUser = session?.user ?? null;
      document.getElementById('auth-form').style.display = currentUser ? 'none' : 'block';
      document.getElementById('profile-content').style.display = currentUser ? 'block' : 'none';
      if (currentUser) {
        await loadProfile(currentUser.id);
        await loadDevices();
      }
    }

    async function signIn() {
      const email = document.getElementById('email')?.value?.trim();
      const password = document.getElementById('password')?.value;
      const msg = document.getElementById('auth-message');
      if (!email || !password) return msg.textContent = 'Введите email и пароль';
      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
      msg.textContent = error ? error.message : 'Вход выполнен';
      if (!error) setTimeout(() => location.reload(), 800);
    }

    async function signUp() {
      const email = document.getElementById('email')?.value?.trim();
      const password = document.getElementById('password')?.value;
      const msg = document.getElementById('auth-message');
      if (!email || !password) return msg.textContent = 'Введите email и пароль';
      const { error } = await supabaseClient.auth.signUp({ email, password });
      msg.textContent = error ? error.message : 'Зарегистрирован! Проверь почту.';
    }

    async function logout() {
      await supabaseClient.auth.signOut();
      location.reload();
    }

    async function loadProfile(userId) {
      try {
        const { data: profile } = await supabaseClient.from('profiles').select('username, is_admin').eq('id', userId).single();
        document.getElementById('profile-username').textContent = profile?.username || 'Пользователь';

        if (profile?.is_admin) document.getElementById('admin-panel')?.classList.remove('hidden');

        const { data: sub } = await supabaseClient.from('subscriptions').select('expires_at, status, max_devices').eq('user_id', userId).maybeSingle();

        const statusEl = document.getElementById('profile-status');
        if (sub && sub.status === 'active') {
          const exp = new Date(sub.expires_at);
          const days = Math.max(0, Math.ceil((exp - new Date()) / 86400000));
          statusEl.textContent = 'Активна';
          statusEl.className = 'text-3xl font-bold status-active px-8 py-3 rounded-full inline-block';
          document.getElementById('profile-end').textContent = `Истекает: ${exp.toLocaleDateString('ru-RU')}`;
          document.getElementById('days-left').textContent = `${days} дней`;
          document.getElementById('max-devices').textContent = sub.max_devices || 10;
        } else {
          statusEl.textContent = 'Неактивна';
          statusEl.className = 'text-3xl font-bold status-inactive px-8 py-3 rounded-full inline-block';
          document.getElementById('profile-end').textContent = '—';
          document.getElementById('days-left').textContent = '—';
        }
      } catch (err) {
        console.error(err);
      }
    }

    async function loadDevices() {
      try {
        const fp = await FingerprintJS.load({ monitoring: false });
        const { visitorId } = await fp.get();

        const { data: sub } = await supabaseClient.from('subscriptions').select('id, max_devices').eq('user_id', currentUser.id).maybeSingle();
        if (!sub) return;

        const { count: used } = await supabaseClient.from('subscription_devices').select('*', { count: 'exact', head: true }).eq('user_id', currentUser.id);

        const percent = ((used || 0) / sub.max_devices) * 100;
        document.getElementById('devices-text').textContent = used || 0;
        document.getElementById('devices-bar').style.width = `${percent}%`;
      } catch (err) {
        console.error(err);
      }
    }

    async function saveHwid() {
      const hwid = document.getElementById('hwid-input').value.trim();
      if (!hwid) return alert('Введите HWID');
      const { error } = await supabaseClient.from('profiles').update({ hwid }).eq('id', currentUser.id);
      alert(error ? 'Ошибка: ' + error.message : 'HWID сохранён');
    }

    async function adminGrantSubscription() {
      const id = document.getElementById('admin-user-identifier')?.value.trim();
      const date = document.getElementById('admin-sub-end')?.value.trim();
      const msg = document.getElementById('admin-message');
      if (!id || !date) return msg.textContent = 'Заполните поля';
      let expiresAt;
      try {
        const [d, m, y] = date.split('.');
        expiresAt = `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}T23:59:59Z`;
      } catch {
        return msg.textContent = 'Неверный формат даты';
      }
      const { error } = await supabaseClient.from('subscriptions').upsert({
        user_id: id,
        status: 'active',
        expires_at: expiresAt
      }, { onConflict: 'user_id' });
      msg.textContent = error ? 'Ошибка' : 'Готово';
    }
  </script>
</body>
</html>
