<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Профиль — KLARK VPN</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Supabase клиент -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Impact:wght@900&family=Inter:wght@400;600;700&display=swap');
    body {
      background: linear-gradient(180deg, #0a1428 0%, #000000 100%);
    }
    .glass {
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(64, 196, 255, 0.3);
    }
    .neon-text {
      text-shadow:
        0 0 10px #40c4ff,
        0 0 20px #1b98e0,
        0 0 40px #0d47a1,
        0 0 60px #7c3aed;
    }
    .glow-button {
      box-shadow: 0 0 25px rgba(64, 196, 255, 0.6),
                  0 0 50px rgba(124, 58, 237, 0.4);
      transition: all 0.3s ease;
    }
    .glow-button:hover {
      box-shadow: 0 0 40px rgba(64, 196, 255, 0.9),
                  0 0 70px rgba(124, 58, 237, 0.7);
      transform: scale(1.03);
    }
    .avatar-glow {
      filter: drop-shadow(0 0 30px #40c4ff) drop-shadow(0 0 60px #7c3aed);
    }
    .pulse-dot {
      animation: pulse 2s infinite ease-in-out;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.6); }
    }
    .fade-in-up {
      animation: fadeInUp 0.9s ease-out forwards;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .stat-card {
      transition: all 0.3s ease;
    }
    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 0 25px rgba(64, 196, 255, 0.3);
    }
  </style>
</head>
<body class="min-h-screen text-white font-sans">

  <!-- ШАПКА -->
  <div class="flex items-center justify-between px-6 py-6">
    <a href="index.html" class="flex items-center gap-3 text-cyan-400 hover:text-cyan-300 font-medium text-lg">
      ← Главная
    </a>
    <div class="text-2xl font-black tracking-widest neon-text">KLARK VPN</div>
  </div>

  <div class="max-w-md mx-auto px-5 pb-12">

    <!-- Форма авторизации -->
    <div id="auth-form" class="max-w-md mx-auto p-8 glass rounded-3xl fade-in-up">
      <h2 class="text-3xl font-bold neon-text text-center mb-6">Вход / Регистрация</h2>
      <input id="email" type="email" placeholder="Email" class="w-full p-4 mb-4 bg-black/40 border border-cyan-500/40 rounded-xl focus:outline-none focus:border-cyan-400">
      <input id="password" type="password" placeholder="Пароль" class="w-full p-4 mb-4 bg-black/40 border border-cyan-500/40 rounded-xl focus:outline-none focus:border-cyan-400">
      <button onclick="signUp()" class="w-full py-4 bg-gradient-to-r from-cyan-600 to-blue-700 rounded-xl font-bold mb-3 hover:opacity-90 transition">Зарегистрироваться</button>
      <button onclick="signIn()" class="w-full py-4 bg-gradient-to-r from-green-600 to-teal-600 rounded-xl font-bold hover:opacity-90 transition">Войти</button>
      <p id="auth-message" class="text-center mt-4 text-red-400 min-h-[1.5rem]"></p>
    </div>

    <!-- Профиль (скрыт по умолчанию) -->
    <div id="profile-content" style="display: none;">

      <!-- Аватар + имя -->
      <div class="flex flex-col items-center mb-8">
        <div class="relative">
          <div class="w-32 h-32 bg-gradient-to-br from-blue-600 to-cyan-500 rounded-3xl p-2 avatar-glow">
            <svg width="112" height="112" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M96 16 C40 16 16 56 16 96 C16 136 40 176 96 176 C152 176 176 136 176 96 C176 56 152 16 96 16 Z" fill="#1b98e0" stroke="#0d47a1" stroke-width="12"/>
              <text x="96" y="135" font-family="Impact" font-size="110" fill="#e3f2fd" text-anchor="middle" dominant-baseline="middle" letter-spacing="-8">K</text>
            </svg>
          </div>
        </div>
        <h2 id="profile-username" class="mt-4 text-4xl font-black neon-text tracking-tighter">Загрузка...</h2>
        <p class="text-cyan-300 text-sm">Premium пользователь</p>
      </div>

      <!-- Главная карточка статуса -->
      <div class="glass rounded-3xl p-8 mb-8">
        <div class="flex items-center justify-between mb-6">
          <div class="flex items-center gap-3">
            <span class="pulse-dot w-5 h-5 bg-emerald-400 rounded-full"></span>
            <span class="text-2xl font-bold">Статус подписки</span>
          </div>
          <span id="profile-end" class="text-emerald-400 font-semibold text-xl">Загрузка...</span>
        </div>

        <!-- Устройства -->
        <div class="mb-8">
          <div class="flex justify-between text-sm mb-2">
            <span class="text-blue-300">Устройств</span>
            <span id="devices-text" class="font-mono">0 / 3</span>
          </div>
          <div class="h-3 bg-black/50 rounded-3xl overflow-hidden">
            <div id="devices-bar" class="h-3 bg-gradient-to-r from-cyan-400 to-violet-500 rounded-3xl w-0 transition-all duration-500"></div>
          </div>
        </div>

        <!-- Ссылка HAPP -->
        <a id="happ-link" href="#" target="_blank"
           class="glow-button block text-center py-6 rounded-3xl bg-gradient-to-r from-emerald-500 to-teal-500 text-2xl font-bold tracking-wider hover:opacity-90 transition">
          📲 МОЯ ЛИЧНАЯ ССЫЛКА HAPP
        </a>
      </div>

      <!-- Мини-карточки -->
      <div class="grid grid-cols-2 gap-4 mb-8">
        <div class="glass rounded-3xl p-6 stat-card text-center">
          <div class="text-5xl mb-2">🔒</div>
          <div class="text-sm text-blue-300">Статус</div>
          <div id="profile-status" class="text-2xl font-bold text-emerald-400">Загрузка...</div>
        </div>
        <div class="glass rounded-3xl p-6 stat-card text-center">
          <div class="text-5xl mb-2">📅</div>
          <div class="text-sm text-blue-300">Осталось</div>
          <div id="days-left" class="text-2xl font-bold text-cyan-300">—</div>
        </div>
      </div>

      <!-- Админ-панель (видна только админу) -->
      <div id="admin-panel" class="glass rounded-3xl p-6 hidden">
        <h3 class="text-xl font-bold neon-text mb-4">Админ: Управление подпиской</h3>
        
        <div class="mb-4">
          <label class="block text-blue-300 mb-2">Дата окончания подписки (ДД.ММ.ГГГГ)</label>
          <input id="admin-sub-end" type="text" placeholder="Например: 31.12.2026" 
                 class="w-full p-3 bg-black/40 border border-cyan-500/40 rounded-xl focus:outline-none focus:border-cyan-400">
        </div>
        
        <button onclick="adminGrantSubscription()"
                class="w-full py-4 bg-gradient-to-r from-purple-600 to-pink-600 rounded-xl font-bold hover:opacity-90 transition">
          Выдать подписку этому пользователю
        </button>
        
        <p id="admin-message" class="text-center mt-4 text-yellow-300 min-h-[1.5rem]"></p>
      </div>

      <!-- Выход -->
      <button onclick="logout()"
              class="mt-8 w-full py-5 text-red-400 font-medium text-lg border border-red-400/30 rounded-3xl hover:bg-red-400/10 transition-all">
        Выйти из профиля
      </button>

    </div>

  </div>

  <!-- Supabase логика -->
  <script>
    // === ТВОИ ДАННЫЕ Supabase ===
    const SUPABASE_URL = 'https://guubiysgtzcgicxichqg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1dWJpeXNndHpjZ2ljeGljaHFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1ODU4NzksImV4cCI6MjA4OTE2MTg3OX0.n0wbEP1f-UjBVC8K_iVmESY32FDMKHTV-sFMtmRQc0s';

    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    window.supabase = supabaseClient;

    // Авто-проверка при загрузке
    window.addEventListener('load', async () => {
      const { data: { user } } = await supabase.auth.getUser();
      if (user) {
        document.getElementById('auth-form').style.display = 'none';
        document.getElementById('profile-content').style.display = 'block';
        await loadProfile();
      } else {
        document.getElementById('auth-form').style.display = 'block';
        document.getElementById('profile-content').style.display = 'none';
      }
    });

    async function signUp() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const msg = document.getElementById('auth-message');

      if (!email || !password) {
        msg.className = 'text-center mt-4 text-red-400';
        msg.textContent = 'Введите email и пароль';
        return;
      }

      const { error } = await supabase.auth.signUp({ email, password });
      if (error) {
        msg.className = 'text-center mt-4 text-red-400';
        msg.textContent = error.message;
      } else {
        msg.className = 'text-center mt-4 text-green-400';
        msg.textContent = 'Зарегистрирован! Проверьте почту и войдите.';
      }
    }

    async function signIn() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const msg = document.getElementById('auth-message');

      if (!email || !password) {
        msg.className = 'text-center mt-4 text-red-400';
        msg.textContent = 'Введите email и пароль';
        return;
      }

      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        msg.className = 'text-center mt-4 text-red-400';
        msg.textContent = error.message;
      } else {
        msg.className = 'text-center mt-4 text-green-400';
        msg.textContent = 'Вход выполнен!';
        setTimeout(async () => {
          document.getElementById('auth-form').style.display = 'none';
          document.getElementById('profile-content').style.display = 'block';
          await loadProfile();
        }, 700);
      }
    }

    async function loadProfile() {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) return;

      const { data: profile, error } = await supabase
        .from('profiles')
        .select('*, is_admin')   // ← берём is_admin
        .eq('id', user.id)
        .single();

      if (error || !profile) {
        alert('Профиль не найден. Возможно, запись в profiles отсутствует.');
        console.error(error);
        return;
      }

      // Основные поля
      document.getElementById('profile-username').textContent = profile.username || user.email.split('@')[0];

      const subEnd = profile.subscription_end;

      if (subEnd) {
        document.getElementById('profile-end').textContent = subEnd;
        document.getElementById('profile-status').textContent = 'Активна';

        // Расчёт оставшихся дней
        try {
          const [day, month, year] = subEnd.split('.').map(Number);
          const endDate = new Date(year, month - 1, day);
          const now = new Date();
          const daysLeft = Math.max(0, Math.ceil((endDate - now) / (1000 * 60 * 60 * 24)));
          document.getElementById('days-left').textContent = daysLeft + ' дней';
        } catch (e) {
          document.getElementById('days-left').textContent = '—';
        }
      } else {
        document.getElementById('profile-end').textContent = 'Нет активной подписки';
        document.getElementById('profile-status').textContent = 'Не активна';
        document.getElementById('days-left').textContent = '—';
      }

      const used = profile.used_devices || 0;
      const max  = profile.max_devices  || 3;
      document.getElementById('devices-text').textContent = `${used} / ${max}`;
      document.getElementById('devices-bar').style.width = `${(used / max) * 100}%`;

      document.getElementById('happ-link').href = profile.happ_link || '#';

      // Показываем админ-панель только админу
      if (profile.is_admin === true) {
        document.getElementById('admin-panel').classList.remove('hidden');
      }
    }

    async function adminGrantSubscription() {
      const newEndDate = document.getElementById('admin-sub-end').value.trim();
      const msg = document.getElementById('admin-message');

      if (!newEndDate || !/^\d{1,2}\.\d{1,2}\.\d{4}$/.test(newEndDate)) {
        msg.className = 'text-center mt-4 text-red-400';
        msg.textContent = 'Введите дату в формате ДД.ММ.ГГГГ';
        return;
      }

      const { data: { user } } = await supabase.auth.getUser();

      const { error } = await supabase
        .from('profiles')
        .update({ subscription_end: newEndDate })
        .eq('id', user.id);

      if (error) {
        msg.className = 'text-center mt-4 text-red-400';
        msg.textContent = 'Ошибка: ' + error.message;
        console.error(error);
      } else {
        msg.className = 'text-center mt-4 text-green-400';
        msg.textContent = 'Подписка выдана! Страница обновится через 2 секунды...';
        setTimeout(loadProfile, 2000);
      }
    }

    async function logout() {
      await supabase.auth.signOut();
      location.reload();
    }
  </script>

</body>
</html>
